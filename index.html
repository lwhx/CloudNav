<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="https://lucide.dev/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <script>
      (function () {
        function applyRoundedFavicon(source) {
          if (!source) return;
          const img = new Image();
          img.crossOrigin = 'anonymous';
          img.onload = function () {
            try {
              var size = 64;
              var radius = 14;
              var canvas = document.createElement('canvas');
              canvas.width = size;
              canvas.height = size;
              var ctx = canvas.getContext('2d');
              if (!ctx) return;

              ctx.beginPath();
              ctx.moveTo(radius, 0);
              ctx.lineTo(size - radius, 0);
              ctx.quadraticCurveTo(size, 0, size, radius);
              ctx.lineTo(size, size - radius);
              ctx.quadraticCurveTo(size, size, size - radius, size);
              ctx.lineTo(radius, size);
              ctx.quadraticCurveTo(0, size, 0, size - radius);
              ctx.lineTo(0, radius);
              ctx.quadraticCurveTo(0, 0, radius, 0);
              ctx.closePath();
              ctx.clip();
              ctx.drawImage(img, 0, 0, size, size);

              var favicon = document.querySelector('link[rel="icon"]');
              if (favicon) {
                favicon.href = canvas.toDataURL('image/png');
              }
            } catch (e) {}
          };
          img.onerror = function () {
            var favicon = document.querySelector('link[rel="icon"]');
            if (favicon) {
              favicon.href = source;
            }
          };
          img.src = source;
        }

        try {
          const saved = localStorage.getItem('cloudnav_site_settings');
          let settings = saved ? JSON.parse(saved) : null;

          if (!settings) {
            const req = new XMLHttpRequest();
            req.open('GET', '/api/storage?getConfig=website', false);
            req.send(null);
            if (req.status >= 200 && req.status < 300 && req.responseText) {
              settings = JSON.parse(req.responseText);
              localStorage.setItem('cloudnav_site_settings', JSON.stringify(settings));
            }
          }

          if (settings && settings.title) {
            document.title = settings.title;
          }
          if (settings && settings.favicon) {
            applyRoundedFavicon(settings.favicon);
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-gray-50 dark:bg-slate-900 text-slate-900 dark:text-slate-50 transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
